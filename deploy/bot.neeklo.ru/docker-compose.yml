# Redis only — Postgres uses host :5432 (separate DB). Does not bind 3001/80/443.
services:
  redis:
    image: redis:7-alpine
    container_name: botmate-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - botmate_redis_data:/data

volumes:
  botmate_redis_data:
